name: CI

# dev 分支与 PR 的持续集成：lint + 单测 + 构建检查（不发布）
on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev, main]

jobs:
  test:
    name: Lint, test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pytest
        run: uv run pytest tests/

      - name: Build distributions (wheel completeness check)
        run: |
          uv build
          unzip -l dist/*.whl | grep -E "assets/.*\.js"
